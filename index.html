<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>龍鳳雙寶活動王</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .card-in { animation: slideUp 0.4s ease forwards; }
    @keyframes slideUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
    .tag-btn { transition: all .18s; cursor: pointer; }
    .tag-btn.active { transform: scale(1.04); }
    .bounce { display:inline-block; animation: bop .7s ease-in-out infinite alternate; }
    @keyframes bop { from{transform:translateY(0)} to{transform:translateY(-5px)} }
  </style>
</head>
<body class="min-h-screen" style="background:linear-gradient(135deg,#fdf2f8 0%,#f0ebff 50%,#fff9eb 100%)">

<header class="bg-white shadow-sm sticky top-0 z-10">
  <div class="max-w-lg mx-auto px-4 py-3 flex items-center gap-3">
    <span class="text-3xl"><span class="bounce">🐉</span><span class="bounce" style="animation-delay:.25s">🌸</span></span>
    <div>
      <div class="text-base font-bold text-purple-800">龍鳳雙寶活動王</div>
      <div class="text-xs text-gray-400">專為 2 歲雙胞胎設計・即時活動建議</div>
    </div>
  </div>
</header>

<main class="max-w-lg mx-auto px-4 py-5 space-y-4">

  <div class="bg-white rounded-2xl shadow-sm p-4">
    <div class="text-sm font-bold text-gray-600 mb-3">📍 現在在哪裡？</div>
    <div class="grid grid-cols-2 gap-2">
      <button class="tag-btn py-3 rounded-xl border-2 border-pink-200 text-sm font-semibold text-pink-600 bg-pink-50" data-group="scene" data-value="公園">🌳 公園</button>
      <button class="tag-btn py-3 rounded-xl border-2 border-yellow-200 text-sm font-semibold text-yellow-600 bg-yellow-50" data-group="scene" data-value="餐廳">🍜 餐廳</button>
      <button class="tag-btn py-3 rounded-xl border-2 border-blue-200 text-sm font-semibold text-blue-600 bg-blue-50" data-group="scene" data-value="家中">🏠 家中</button>
      <button class="tag-btn py-3 rounded-xl border-2 border-green-200 text-sm font-semibold text-green-600 bg-green-50" data-group="scene" data-value="大眾運輸">🚌 大眾運輸</button>
    </div>
  </div>

  <div class="bg-white rounded-2xl shadow-sm p-4">
    <div class="text-sm font-bold text-gray-600 mb-3">🌤️ 環境狀況？</div>
    <div class="grid grid-cols-2 gap-2">
      <button class="tag-btn py-3 rounded-xl border-2 border-orange-200 text-sm font-semibold text-orange-600 bg-orange-50" data-group="env" data-value="晴天">☀️ 晴天</button>
      <button class="tag-btn py-3 rounded-xl border-2 border-indigo-200 text-sm font-semibold text-indigo-600 bg-indigo-50" data-group="env" data-value="雨天">🌧️ 雨天</button>
      <button class="tag-btn py-3 rounded-xl border-2 border-red-200 text-sm font-semibold text-red-600 bg-red-50" data-group="env" data-value="擁擠">👥 擁擠</button>
      <button class="tag-btn py-3 rounded-xl border-2 border-teal-200 text-sm font-semibold text-teal-600 bg-teal-50" data-group="env" data-value="安靜">🤫 安靜</button>
    </div>
  </div>

  <div class="bg-white rounded-2xl shadow-sm p-4">
    <div class="text-sm font-bold text-gray-600 mb-3">⚡ 目前狀態？</div>
    <div class="flex flex-col gap-2">
      <button class="tag-btn py-3 rounded-xl border-2 border-purple-200 text-sm font-semibold text-purple-700 bg-purple-50" data-group="state" data-value="精力充沛">🔋 小孩精力充沛</button>
      <button class="tag-btn py-3 rounded-xl border-2 border-pink-200 text-sm font-semibold text-pink-700 bg-pink-50" data-group="state" data-value="快斷線">😤 小孩快斷線（崩潰邊緣）</button>
      <button class="tag-btn py-3 rounded-xl border-2 border-gray-200 text-sm font-semibold text-gray-600 bg-gray-50" data-group="state" data-value="父母疲憊">😴 爸媽超累了</button>
    </div>
  </div>

  <button onclick="generate()"
    class="w-full py-4 rounded-2xl text-white font-bold text-lg shadow-lg transition-all active:scale-95"
    style="background:linear-gradient(135deg,#f472b6,#a855f7)">
    ✨ 生成活動建議！
  </button>

  <div id="results" class="space-y-4" style="display:none"></div>

</main>

<footer class="text-center py-4 text-xs text-gray-400">用心陪伴龍寶與鳳寶的每一刻 💕</footer>

const sel = {scene:null, env:null, state:null};

document.querySelectorAll('.tag-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const g = btn.dataset.group;
    document.querySelectorAll('[data-group="'+g+'"]').forEach(b => {
      b.classList.remove('active');
      b.style.boxShadow = '';
    });
    sel[g] = btn.dataset.value;
    btn.classList.add('active');
    btn.style.boxShadow = '0 0 0 3px #a855f7';
  });
});

function generate() {
  const {scene, env, state} = sel;
  let pool = DB.filter(a =>
    (!scene || a.scenes.includes(scene)) &&
    (!env   || a.envs.includes(env))   &&
    (!state || a.states.includes(state))
  );
  if (pool.length < 3) pool = DB.filter(a =>
    (!scene || a.scenes.includes(scene)) && (!state || a.states.includes(state))
  );
  if (pool.length < 3) pool = [...DB];

  const picks = pool.sort(() => Math.random()-.5).slice(0,3);
  const el = document.getElementById('results');
  el.style.display = 'block';
  el.innerHTML = '';

  const tags = [scene,env,state].filter(Boolean);
  const tagHtml = tags.length
    ? tags.map(t=>'<span style="display:inline-block;padding:2px 10px;border-radius:99px;font-size:12px;font-weight:600;color:#6d28d9;background:#ede9fe;margin-right:4px">'+t+'</span>').join('')
    : '<span style="font-size:12px;color:#9ca3af">（精選推薦）</span>';

  const hdr = document.createElement('div');
  hdr.className = 'card-in';
  hdr.innerHTML = '<div style="font-weight:700;color:#374151;margin-bottom:8px">✨ 為雙寶推薦的活動</div><div style="margin-bottom:4px">'+tagHtml+'</div>';
  el.appendChild(hdr);

  const palettes = [
    {grad:'#f472b6,#ec4899',bg:'#fff0f6',border:'#fbcfe8'},
    {grad:'#a78bfa,#7c3aed',bg:'#f5f3ff',border:'#ddd6fe'},
    {grad:'#fbbf24,#f59e0b',bg:'#fffbeb',border:'#fde68a'},
  ];

  picks.forEach((item, i) => {
    const p = palettes[i];
    const card = document.createElement('div');
    card.className = 'card-in';
    card.style.cssText = 'border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08);border:2px solid '+p.border+';animation-delay:'+i*.12+'s;opacity:0';
    card.innerHTML =
      '<div style="background:linear-gradient(135deg,'+p.grad+');padding:12px 16px;display:flex;align-items:center;gap:10px">'+
        '<span style="font-size:22px">'+item.emoji+'</span>'+
        '<span style="color:white;font-weight:700;font-size:15px">'+item.title+'</span>'+
        '<span style="margin-left:auto;background:rgba(255,255,255,0.25);color:white;font-size:11px;padding:2px 8px;border-radius:99px">#'+(i+1)+'</span>'+
      '</div>'+
      '<div style="background:'+p.bg+';padding:14px 16px">'+
        '<p style="color:#374151;font-size:13.5px;line-height:1.7;margin-bottom:10px">'+item.desc+'</p>'+
        '<div style="background:white;border-radius:12px;padding:10px 12px;margin-bottom:8px">'+
          '<div style="font-size:11px;font-weight:700;color:#9ca3af;margin-bottom:4px">💡 爸媽小提示</div>'+
          '<div style="font-size:12.5px;color:#4b5563;line-height:1.6">'+item.tip+'</div>'+
        '</div>'+
        '<div style="background:white;border-radius:12px;padding:10px 12px">'+
          '<div style="font-size:11px;font-weight:700;color:#9ca3af;margin-bottom:4px">👯 雙胞胎設計巧思</div>'+
          '<div style="font-size:12.5px;color:#6d28d9;font-weight:600;line-height:1.6">'+item.twin+'</div>'+
        '</div>'+
      '</div>';
    el.appendChild(card);
  });

  const reBtn = document.createElement('button');
  reBtn.className = 'card-in';
  reBtn.style.cssText = 'width:100%;padding:12px;border-radius:12px;font-size:14px;font-weight:600;color:#7c3aed;border:2px dashed #c4b5fd;background:white;animation-delay:.4s;opacity:0;cursor:pointer;display:block';
  reBtn.textContent = '🎲 再換三個看看';
  reBtn.onclick = generate;
  el.appendChild(reBtn);

  setTimeout(() => el.scrollIntoView({behavior:'smooth',block:'start'}), 80);
}
